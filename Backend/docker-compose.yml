name: hpa

services:

  # ─── Infrastructure ───────────────────────────────────────────────
  postgres:
    image: postgres:18.1-alpine
    container_name: hpa-postgres
    environment:
      POSTGRES_DB: hpa
      POSTGRES_USER: hpa
      POSTGRES_PASSWORD: hpa
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hpa"]
      interval: 5s
      timeout: 5s
      retries: 5

  keycloak:
    image: quay.io/keycloak/keycloak:24.0.4
    container_name: hpa-keycloak
    command: start-dev
    environment:
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD-SHELL", "exec 3<>/dev/tcp/localhost/8080 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 15
      start_period: 30s

  minio:
    image: minio/minio:latest
    container_name: hpa-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"   # S3 API
      - "9001:9001"   # Web console → http://localhost:9001
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 5s
      retries: 5

  # Creates the bucket on first start
  minio-init:
    image: minio/mc:latest
    container_name: hpa-minio-init
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
        mc alias set local http://minio:9000 minioadmin minioadmin;
        mc mb --ignore-existing local/hpa-models;
        echo 'Bucket hpa-models ready';
      "

  # ─── Django backend ───────────────────────────────────────────────
  django:
    build:
      context: ./django
      dockerfile: Dockerfile
    container_name: hpa-django
    command: >
      sh -c "python manage.py migrate &&
             python manage.py runserver 0.0.0.0:8000"
    environment:
      DATABASE_URL: postgres://hpa:hpa@postgres:5432/hpa
      ML_SERVICE_URL: http://ml-service:8001
      KEYCLOAK_URL: http://keycloak:8080
      KEYCLOAK_REALM: hpa
      KEYCLOAK_CLIENT_ID: hpa-backend
      KEYCLOAK_CLIENT_SECRET: ${KEYCLOAK_CLIENT_SECRET:-}
      MINIO_ENDPOINT: http://minio:9000
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
      MINIO_BUCKET: hpa-models
    ports:
      - "8000:8000"
    volumes:
      - ./django:/app
    depends_on:
      postgres:
        condition: service_healthy
      keycloak:
        condition: service_healthy

  # ─── FastAPI ML service ───────────────────────────────────────────
  ml-service:
    build:
      context: ../Model Training
      dockerfile: Dockerfile
    container_name: hpa-ml-service
    environment:
      DATABASE_URL: postgres://hpa:hpa@postgres:5432/hpa
      MINIO_ENDPOINT: http://minio:9000
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
      MINIO_BUCKET: hpa-models
      DJANGO_URL: http://django:8000
    ports:
      - "8001:8001"
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully

volumes:
  postgres_data:
  minio_data:
